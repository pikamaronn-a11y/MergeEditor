<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>バージョン情報</title>
    <style>
        body {
            font-family: 'Segoe UI', 'Meiryo', sans-serif;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 24px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        h1 { font-size: 24px; color: #4fc3f7; margin-bottom: 8px; }
        .version { font-size: 16px; color: #cccccc; margin-bottom: 24px; }
        .close-btn {
            padding: 8px 24px;
            background: #007acc;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }
        .close-btn:hover { background: #1a8cd8; }
    </style>
</head>
<body>
    <h1>MergeEditor</h1>
    <div class="version">Version 1.0.0</div>
    <button class="close-btn" onclick="window.close()">閉じる</button>
</body>
</html>
