<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>バージョン情報</title>
    <style>
        :root {
            --ui-font-family: 'Segoe UI', 'Meiryo', sans-serif;
            --ui-font-size: 10px;
        }
        body {
            font-family: var(--ui-font-family);
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 24px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        h1 { font-size: calc(var(--ui-font-size) * 2.4); color: #4fc3f7; margin-bottom: 8px; }
        .version { font-size: calc(var(--ui-font-size) * 1.6); color: #cccccc; margin-bottom: 24px; }
        .close-btn {
            padding: 8px 24px;
            background: #007acc;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: calc(var(--ui-font-size) * 1.4);
            cursor: pointer;
            font-family: var(--ui-font-family);
        }
        .close-btn:hover { background: #1a8cd8; }
    </style>
</head>
<body>
    <h1>MergeEditor</h1>
    <div class="version">Version 1.2.0</div>
    <button class="close-btn" onclick="window.close()">閉じる</button>
    <script>
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') window.close();
        });
        if (window.electronAPI) {
            window.electronAPI.onApplyDialogFont(function(config) {
                if (config && config.ui) {
                    document.documentElement.style.setProperty('--ui-font-family', "'" + config.ui.family + "'");
                    document.documentElement.style.setProperty('--ui-font-size', config.ui.size + 'px');
                }
            });
        }
    </script>
</body>
</html>
