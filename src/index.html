<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MergeEditor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 通常エディタ -->
    <div id="container"></div>

    <!-- 衝突解決フローティングツールバー -->
    <div id="conflict-toolbar" class="conflict-toolbar hidden">
        <span class="conflict-toolbar-info">⚠️ 衝突を解決してください</span>
        <div class="conflict-toolbar-actions">
            <button class="btn btn-accept" id="conflict-accept-all-btn">すべて外部を取り込む</button>
            <button class="btn btn-keep" id="conflict-keep-all-btn">すべて自分を保持</button>
        </div>
    </div>

    <div id="statusbar">
        <div id="statusbar-content">
            <span id="status-language" class="status-action-toggle" title="クリックでスクロールON/OFF">Plain Text</span>
            <span id="status-wrap" class="status-wrap status-action-toggle" title="右端で折り返し: OFF / クリックでスクロールON/OFF">折り返し: OFF</span>
            <span id="status-font" class="status-action-font" title="クリックでフォント設定">Consolas 14px</span>
            <span id="status-pending-collision" class="status-pending-collision hidden" title="クリックで衝突箇所へ移動">⚠️ 衝突解決待ち</span>
            <span id="status-change-indicator" class="status-change-indicator hidden" title="クリックで変更箇所へ移動">⚠️ 外部更新: 0箇所</span>
            <span id="status-cursor" class="status-action-copy" title="クリックでコピー">行 1, 列 1</span>
            <span id="status-info" class="status-action-copy" title="クリックでコピー">行数: 0 | 文字数: 0</span>
        </div>
    </div>

    <script src="../node_modules/monaco-editor/min/vs/loader.js"></script>
    <script src="app.js"></script>
</body>
</html>
